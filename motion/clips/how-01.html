<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <title>How 01 — Strategy call</title>
    <link rel="stylesheet" href="_kit.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      #card { left: 300px; top: 150px; width: 1320px; height: 780px; }
      #hd { position: absolute; left: 360px; top: 206px; }
      #hd .step { font-family: var(--display); font-weight: 600; font-size: 30px; letter-spacing: 0.12em; color: var(--violet); }
      #hd .ttl { font-family: var(--display); font-weight: 600; font-size: 76px; letter-spacing: -0.02em; margin-top: 12px; }
      .funnel { position: absolute; left: 360px; top: 432px; width: 1200px; }
      .bar { position: relative; height: 104px; border-radius: 18px; margin-bottom: 30px;
        display: flex; align-items: center; padding: 0 34px; color: var(--ink); font-family: var(--display); font-weight: 600; font-size: 38px; }
      #bar1 { width: 1000px; background: color-mix(in srgb, var(--violet) 16%, var(--card)); border: 1px solid color-mix(in srgb, var(--violet) 30%, transparent); }
      #bar2 { width: 620px; background: color-mix(in srgb, var(--ink-muted) 14%, var(--card)); border: 1px solid var(--line); }
      #bar3 { width: 360px; background: color-mix(in srgb, var(--teal) 16%, var(--card)); border: 1px solid color-mix(in srgb, var(--teal) 32%, transparent); }
      .bar .n { margin-left: auto; font-family: var(--display); font-weight: 600; font-size: 30px; color: var(--ink-muted); }
      #scan { position: absolute; left: 348px; width: 1224px; height: 5px; border-radius: 4px;
        background: linear-gradient(100deg, var(--teal), var(--violet)); opacity: 0; filter: drop-shadow(0 0 16px rgba(142,45,226,.5)); }
      #leak { position: absolute; left: 1030px; top: 556px; opacity: 0; }
      #leak .pin { display: inline-flex; align-items: center; gap: 14px; padding: 16px 26px; border-radius: 14px;
        background: var(--ink-bg); color: var(--ink-onbg); font-family: var(--display); font-weight: 600; font-size: 28px; box-shadow: 0 24px 50px -24px rgba(0,0,0,.5); white-space: nowrap; }
      #leak .pin .d { width: 14px; height: 14px; border-radius: 50%; background: var(--teal); flex: none; }
      #leak .stem { width: 2px; height: 30px; background: var(--ink-bg); margin-left: 40px; }
    </style>
  </head>
  <body>
    <div id="stage" class="stage" data-composition-id="how-01" data-width="1920" data-height="1080" data-start="0" data-duration="6">
      <div class="ambient"></div>
      <div id="card" class="card"></div>
      <div id="hd"><div class="step">STEP 01</div><div class="ttl">Strategy call</div></div>

      <div class="funnel">
        <div class="bar" id="bar1">Leads in <span class="n">100%</span></div>
        <div class="bar" id="bar2">Answered <span class="n">63%</span></div>
        <div class="bar" id="bar3">Booked <span class="n">31%</span></div>
      </div>
      <div id="scan"></div>
      <div id="leak"><div class="stem"></div><div class="pin"><span class="d"></span>Where you’re leaking revenue</div></div>
      <div class="grain"></div>

      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });
          gsap.set("#scan", { top: 420, opacity: 0 });
          gsap.set("#leak", { opacity: 0, y: -10 });
          gsap.set("#bar2", { boxShadow: "0 0 0 rgba(142,45,226,0)" });

          // scan sweep across the funnel
          tl.to("#scan", { opacity: 1, duration: 0.3 }, 0.6);
          tl.to("#scan", { top: 820, duration: 1.5, ease: "none" }, 0.7);
          tl.to("#scan", { opacity: 0, duration: 0.3 }, 2.1);

          // the big drop (100% -> 63%) is the leak — glow + pin
          tl.to("#bar2", { boxShadow: "0 0 0 3px var(--violet), 0 0 46px -6px rgba(142,45,226,.55)", duration: 0.5, ease: "power2.out" }, 1.7);
          tl.to("#leak", { opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.7)" }, 2.0);

          // hold, then reset to the t0 state for a seamless loop
          tl.to("#leak", { opacity: 0, y: -10, duration: 0.4, ease: "power2.in" }, 5.0);
          tl.to("#bar2", { boxShadow: "0 0 0 rgba(142,45,226,0)", duration: 0.5 }, 5.0);

          window.__timelines = window.__timelines || {};
          window.__timelines["how-01"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
