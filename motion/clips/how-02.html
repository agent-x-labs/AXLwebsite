<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <title>How 02 - We build your agent</title>
    <link rel="stylesheet" href="_kit.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      #card { left: 300px; top: 150px; width: 1320px; height: 780px; }
      #content { position: absolute; inset: 0; transform: translateY(-115px); }
      #wire { position: absolute; inset: 0; }
      .core { position: absolute; left: 810px; top: 470px; width: 300px; height: 250px; border-radius: 30px;
        background: var(--card); border: 2px solid transparent;
        background-image: linear-gradient(var(--card), var(--card)), linear-gradient(120deg, var(--teal), var(--violet));
        background-origin: border-box; background-clip: padding-box, border-box;
        box-shadow: 0 40px 90px -50px rgba(26,18,30,.5); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
      .core .spark { width: 84px; height: 84px; color: var(--violet); }
      .core .cl { font-family: var(--display); font-weight: 600; font-size: 26px; letter-spacing: 0.08em; color: var(--ink-soft); }
      .chip2 { position: absolute; width: 300px; height: 96px; border-radius: 18px; background: var(--paper); border: 1px solid var(--line);
        display: flex; align-items: center; gap: 20px; padding: 0 26px; }
      .chip2 .ci { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--ink-muted) 16%, var(--card)); color: var(--ink-muted); }
      .chip2 .ci svg { width: 28px; height: 28px; }
      .chip2 .nm { font-family: var(--display); font-weight: 600; font-size: 32px; }
      .chip2 .cring { position: absolute; inset: -2px; border: 2px solid var(--teal); border-radius: 18px; opacity: 0; pointer-events: none;
        box-shadow: 0 0 26px -6px rgba(0,191,143,.5); }
      #t1 { left: 410px; top: 430px; } #t2 { left: 410px; top: 664px; }
      #t3 { left: 1210px; top: 430px; } #t4 { left: 1210px; top: 664px; }
      #built { position: absolute; left: 0; right: 0; top: 838px; text-align: center;
        font-family: var(--display); font-weight: 600; font-size: 30px; letter-spacing: 0.06em; color: var(--teal-deep); opacity: 0; }
    </style>
  </head>
  <body>
    <div id="stage" class="stage" data-composition-id="how-02" data-width="1920" data-height="1080" data-start="0" data-duration="6">
      <div class="ambient"></div>
      <div id="card" class="card"></div>
      <div id="content">
      <svg id="wire" viewBox="0 0 1920 1080">
        <line class="conn" id="l1" x1="710" y1="478" x2="900" y2="560" pathLength="1" stroke="#00bf8f" stroke-width="3" fill="none" stroke-dasharray="1" stroke-dashoffset="1" />
        <line class="conn" id="l2" x1="710" y1="712" x2="900" y2="640" pathLength="1" stroke="#00bf8f" stroke-width="3" fill="none" stroke-dasharray="1" stroke-dashoffset="1" />
        <line class="conn" id="l3" x1="1210" y1="478" x2="1020" y2="560" pathLength="1" stroke="#00bf8f" stroke-width="3" fill="none" stroke-dasharray="1" stroke-dashoffset="1" />
        <line class="conn" id="l4" x1="1210" y1="712" x2="1020" y2="640" pathLength="1" stroke="#00bf8f" stroke-width="3" fill="none" stroke-dasharray="1" stroke-dashoffset="1" />
      </svg>

      <div class="core">
        <svg class="spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M12 16v6M2 12h6M16 12h6M5 5l3.5 3.5M15.5 15.5L19 19M19 5l-3.5 3.5M8.5 15.5L5 19"/><circle cx="12" cy="12" r="3"/></svg>
        <div class="cl">YOUR AGENT</div>
      </div>

      <div class="chip2" id="t1"><div class="cring"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></div><div class="nm">Calendar</div></div>
      <div class="chip2" id="t2"><div class="cring"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div><div class="nm">Phone</div></div>
      <div class="chip2" id="t3"><div class="cring"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 7l8 5 8-5"/></svg></div><div class="nm">CRM</div></div>
      <div class="chip2" id="t4"><div class="cring"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg></div><div class="nm">WhatsApp</div></div>
      <div id="built">✓ Built in days - wired into your tools</div>
      </div>
      <div class="grain"></div>

      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });
          const chips = ["#t1", "#t2", "#t3", "#t4"];
          const lines = ["#l1", "#l2", "#l3", "#l4"];
          gsap.set(lines, { strokeDashoffset: 1 });
          gsap.set("#built", { opacity: 0, y: 8 });
          gsap.set(".core", { scale: 0.96 });

          // gentle core settle (loops fine: starts and ends near 1)
          tl.to(".core", { scale: 1, duration: 0.6, ease: "power2.out" }, 0.3);

          // wire each tool into the core (rings + color = tweens, seek-safe)
          lines.forEach((l, i) => {
            const t = 0.7 + i * 0.42;
            tl.to(l, { strokeDashoffset: 0, duration: 0.5, ease: "power2.inOut" }, t);
            tl.to(chips[i] + " .cring", { opacity: 1, duration: 0.35, ease: "power2.out" }, t + 0.3);
            tl.to(chips[i] + " .ci", { color: "#009b74", duration: 0.35 }, t + 0.3);
            tl.fromTo(chips[i], { scale: 0.97 }, { scale: 1, duration: 0.35, ease: "back.out(2)", immediateRender: false }, t + 0.32);
          });

          // core pulse + built label
          tl.fromTo(".core", { boxShadow: "0 40px 90px -50px rgba(26,18,30,.5)" },
            { boxShadow: "0 0 0 4px color-mix(in srgb, var(--teal) 40%, transparent), 0 40px 90px -50px rgba(26,18,30,.5)", duration: 0.5, yoyo: true, repeat: 1, immediateRender: false }, 2.5);
          tl.to("#built", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 2.8);

          // reset for seamless loop (all tweens)
          tl.to("#built", { opacity: 0, y: 8, duration: 0.4, ease: "power2.in" }, 5.0);
          tl.to(lines, { strokeDashoffset: 1, duration: 0.4, ease: "power2.in" }, 5.0);
          tl.to(".chip2 .cring", { opacity: 0, duration: 0.4 }, 5.0);
          tl.to(".chip2 .ci", { color: "#8a8190", duration: 0.4 }, 5.0);

          window.__timelines = window.__timelines || {};
          window.__timelines["how-02"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
