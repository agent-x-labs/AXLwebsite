<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <title>After-Sales Agent</title>
    <link rel="stylesheet" href="_kit.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      #kick { position: absolute; left: 160px; top: 150px; }
      #flow-svg { position: absolute; inset: 0; }
      .stg { position: absolute; width: 300px; height: 300px; top: 360px; border-radius: 28px;
        background: var(--card); border: 1px solid var(--line);
        box-shadow: 0 40px 90px -50px rgba(26,18,30,.4), 0 1px 0 rgba(255,255,255,.7) inset;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; opacity: 0.5; }
      .stg .ic { width: 96px; height: 96px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--line); background: var(--paper); color: var(--ink-muted); }
      .stg .ic svg { width: 46px; height: 46px; }
      .stg .cap { font-family: var(--display); font-weight: 600; font-size: 28px; letter-spacing: 0.02em; color: var(--ink-soft); }
      .stg .ic.tealic { color: var(--teal-deep); border-color: color-mix(in srgb, var(--teal) 55%, transparent); background: color-mix(in srgb, var(--teal) 12%, var(--card)); }
      .stg .ic.violetic { color: var(--violet); border-color: color-mix(in srgb, var(--violet) 55%, transparent); background: color-mix(in srgb, var(--violet) 12%, var(--card)); }
      #s1 { left: 150px; } #s2 { left: 590px; } #s3 { left: 1030px; } #s4 { left: 1470px; }
      .stars { display: flex; gap: 8px; height: 96px; align-items: center; }
      .stars svg { width: 40px; height: 40px; color: var(--line); }
    </style>
  </head>
  <body>
    <div id="stage" class="stage" data-composition-id="after-sales" data-width="1920" data-height="1080" data-start="0" data-duration="7">
      <div class="ambient"></div>
      <div id="kick" class="label" style="color: var(--violet)">After-Sales Agent</div>

      <svg id="flow-svg" viewBox="0 0 1920 1080">
        <defs>
          <filter id="soft2" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6" /></filter>
          <linearGradient id="pg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00bf8f" /><stop offset="1" stop-color="#8e2de2" /></linearGradient>
        </defs>
        <line id="track" x1="300" y1="510" x2="1620" y2="510" stroke="#d2c9b6" stroke-width="3" />
        <path id="arc" d="M 1620 660 C 1620 880, 300 880, 300 660" fill="none" stroke="#d2c9b6" stroke-width="3" stroke-dasharray="6 14" opacity="0.7" />
        <circle id="pulse" r="9" fill="url(#pg2)" filter="url(#soft2)" opacity="0" />
      </svg>

      <div class="stg" id="s1"><div class="ic tealic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><div class="cap">Job done</div></div>
      <div class="stg" id="s2"><div class="ic violetic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="cap">Follow-up sent</div></div>
      <div class="stg" id="s3">
        <div class="stars">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .6-5.3 4.6L18.2 21 12 17.3 5.8 21l1.5-7.3L2 9.1l7-.6z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .6-5.3 4.6L18.2 21 12 17.3 5.8 21l1.5-7.3L2 9.1l7-.6z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .6-5.3 4.6L18.2 21 12 17.3 5.8 21l1.5-7.3L2 9.1l7-.6z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .6-5.3 4.6L18.2 21 12 17.3 5.8 21l1.5-7.3L2 9.1l7-.6z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 6.5 7 .6-5.3 4.6L18.2 21 12 17.3 5.8 21l1.5-7.3L2 9.1l7-.6z"/></svg>
        </div>
        <div class="cap">5-star review</div>
      </div>
      <div class="stg" id="s4"><div class="ic violetic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></div><div class="cap">Referral</div></div>
      <div class="grain"></div>

      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });
          const P0 = [1620, 660], P1 = [1620, 880], P2 = [300, 880], P3 = [300, 660];
          const pulse = document.getElementById("pulse");
          const stars = gsap.utils.toArray("#s3 .stars svg");
          const xs = { s1: 300, s2: 740, s3: 1180, s4: 1620 };

          // icons are always coloured; "lit" is pure opacity + scale (tweens, seek-safe)
          function lightStage(id, t) {
            tl.to("#" + id, { opacity: 1, scale: 1.05, duration: 0.45, ease: "back.out(1.8)", transformOrigin: "center" }, t);
            tl.to("#" + id, { scale: 1, duration: 0.5, ease: "power2.out" }, t + 0.5);
          }
          function dimStage(id, t) {
            tl.to("#" + id, { opacity: 0.5, duration: 0.5, ease: "power2.in" }, t);
          }

          // pulse rides the top track between stages
          function ride(x1, x2, t, dur) {
            tl.set(pulse, { attr: { cx: x1, cy: 510 }, opacity: 1 }, t);
            tl.to(pulse, { attr: { cx: x2 }, duration: dur, ease: "power1.inOut" }, t);
          }

          // 1 -> 2 -> 3 -> 4 along the track, lighting each
          lightStage("s1", 0.3);
          ride(xs.s1, xs.s2, 0.7, 0.8); lightStage("s2", 1.5);
          ride(xs.s2, xs.s3, 1.9, 0.8); lightStage("s3", 2.7);
          // stars fill
          stars.forEach((s, i) => tl.to(s, { color: "#00bf8f", duration: 0.3, ease: "power2.out" }, 2.85 + i * 0.14));
          ride(xs.s3, xs.s4, 3.7, 0.8); lightStage("s4", 4.5);

          // return arc: pulse rides the curve back to stage 1 (the next job)
          tl.to("#arc", { opacity: 1, duration: 0.3 }, 4.9);
          const proxy = { t: 0 };
          tl.set(pulse, { attr: { cx: P0[0], cy: P0[1] }, opacity: 1 }, 5.0);
          tl.to(proxy, {
            t: 1, duration: 1.3, ease: "power1.inOut",
            onUpdate() {
              const u = proxy.t, v = 1 - u;
              const x = v*v*v*P0[0] + 3*v*v*u*P1[0] + 3*v*u*u*P2[0] + u*u*u*P3[0];
              const y = v*v*v*P0[1] + 3*v*v*u*P1[1] + 3*v*u*u*P2[1] + u*u*u*P3[1];
              pulse.setAttribute("cx", x); pulse.setAttribute("cy", y);
            },
          }, 5.0);
          tl.to("#arc", { opacity: 0.7, duration: 0.3 }, 6.3);

          // reset for the seamless loop: dim 2,3,4 + empty stars, keep s1 lit (the cycle re-begins on it)
          dimStage("s2", 5.2); dimStage("s3", 5.4); dimStage("s4", 5.6);
          stars.forEach((s) => tl.to(s, { color: "#dcd4c5", duration: 0.4 }, 5.4));
          tl.to(pulse, { opacity: 0, duration: 0.25 }, 6.35);
          // re-pulse stage 1 as the loop closes
          tl.fromTo("#s1", { scale: 1 }, { scale: 1.05, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut", transformOrigin: "center" }, 6.4);

          window.__timelines = window.__timelines || {};
          window.__timelines["after-sales"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
