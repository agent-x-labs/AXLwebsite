<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <title>Content Marketing Agent</title>
    <link rel="stylesheet" href="_kit.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      #card { left: 360px; top: 190px; width: 1200px; height: 700px; }
      #head { left: 412px; top: 240px; width: 1096px; justify-content: space-between; }
      .status { position: relative; width: 360px; height: 56px; }
      .status .chip { position: absolute; right: 0; top: 0; }
      .beat { position: absolute; left: 412px; width: 1096px; top: 372px; }

      /* Beat 1 — plan */
      .cal { display: flex; gap: 20px; margin-top: 26px; }
      .cal .cell { width: 196px; height: 220px; border-radius: 20px; border: 1px solid var(--line);
        background: var(--paper); padding: 22px; display: flex; flex-direction: column; gap: 14px; }
      .cal .cell .d { font-family: var(--display); font-weight: 600; font-size: 22px; color: var(--ink-muted); }
      .cal .cell .pdot { width: 100%; height: 16px; border-radius: 8px; background: color-mix(in srgb, var(--ink-muted) 22%, var(--card)); }
      .cal .cell.plan { border-color: var(--violet); background: color-mix(in srgb, var(--violet) 9%, var(--card)); }
      .cal .cell.plan .pdot { background: var(--violet); }

      /* Beat 2 — compose */
      .post { margin-top: 14px; }
      .post .by { display: flex; align-items: center; gap: 18px; }
      .post .by .av { width: 64px; height: 64px; border-radius: 50%; background: color-mix(in srgb, var(--violet) 14%, var(--card)); border: 1px solid color-mix(in srgb, var(--violet) 40%, transparent); display: flex; align-items: center; justify-content: center; color: var(--violet); }
      .post .by .av svg { width: 34px; height: 34px; }
      .post .caret { width: 6px; height: 40px; background: var(--violet); border-radius: 3px; margin-top: 22px; opacity: 0; }
      .post .by .nm { font-family: var(--display); font-weight: 600; font-size: 34px; }
      .post .by .hn { font-family: var(--display); font-weight: 600; font-size: 22px; color: var(--ink-muted); }
      .post .lines { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; }
      .post .lines .ln { height: 26px; border-radius: 13px; background: color-mix(in srgb, var(--ink) 12%, var(--card)); transform-origin: left center; }

      /* Beat 3 — publish */
      .chans { display: flex; flex-direction: column; gap: 22px; margin-top: 26px; }
      .chan { position: relative; display: flex; align-items: center; gap: 22px; height: 92px; padding: 0 30px; border-radius: 18px;
        border: 1px solid var(--line); background: var(--paper); }
      .chan .cdone { position: absolute; inset: -1px; border: 2px solid var(--teal); border-radius: 18px; opacity: 0; pointer-events: none;
        box-shadow: 0 0 24px -6px rgba(0,191,143,.45); }
      .chan .ci { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--ink-muted) 16%, var(--card)); color: var(--ink-muted); }
      .chan .ci svg { width: 28px; height: 28px; }
      .chan .nm { font-family: var(--display); font-weight: 600; font-size: 34px; flex: 1; }
      .chan .tk { font-family: var(--display); font-weight: 600; font-size: 24px; color: var(--ink-muted); }
    </style>
  </head>
  <body>
    <div id="stage" class="stage" data-composition-id="content-marketing" data-width="1920" data-height="1080" data-start="0" data-duration="7">
      <div class="ambient"></div>
      <div id="card" class="card"></div>
      <div id="head" class="row">
        <div class="label" style="color: var(--violet)">Content Marketing Agent</div>
        <div class="status">
          <div class="chip violet" id="st-plan"><span class="dot violet"></span>Planning</div>
          <div class="chip violet" id="st-write" style="opacity:0"><span class="dot violet"></span>Writing in your voice</div>
          <div class="chip teal" id="st-pub" style="opacity:0"><span class="dot teal"></span>Published</div>
        </div>
      </div>

      <!-- Beat 1: plan -->
      <div id="b1" class="beat">
        <div class="label">This week’s plan</div>
        <div class="cal">
          <div class="cell"><span class="d">Mon</span><span class="pdot"></span></div>
          <div class="cell plan"><span class="d">Tue</span><span class="pdot"></span></div>
          <div class="cell"><span class="d">Wed</span><span class="pdot"></span></div>
          <div class="cell"><span class="d">Thu</span><span class="pdot"></span></div>
          <div class="cell"><span class="d">Fri</span><span class="pdot"></span></div>
        </div>
      </div>

      <!-- Beat 2: compose -->
      <div id="b2" class="beat" style="opacity:0">
        <div class="post">
          <div class="by"><div class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l8-4v18M19 21V10l-6-3"/><path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg></div><div><div class="nm">Your business</div><div class="hn">@yourbusiness · drafting</div></div></div>
          <div class="lines">
            <div class="ln" style="width: 96%"></div>
            <div class="ln" style="width: 88%"></div>
            <div class="ln" style="width: 70%"></div>
          </div>
          <div class="caret" id="caret"></div>
        </div>
      </div>

      <!-- Beat 3: publish -->
      <div id="b3" class="beat" style="opacity:0">
        <div class="chans">
          <div class="chan" id="c1"><div class="cdone"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H7l-3 3z"/></svg></div><div class="nm">Social post</div><div class="tk">Posted</div></div>
          <div class="chan" id="c2"><div class="cdone"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 7l8 5 8-5"/></svg></div><div class="nm">Email list</div><div class="tk">Sent</div></div>
          <div class="chan" id="c3"><div class="cdone"></div><div class="ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></div><div class="nm">Website blog</div><div class="tk">Published</div></div>
        </div>
      </div>
      <div class="grain"></div>

      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });
          gsap.set(["#b2", "#b3", "#st-write", "#st-pub"], { opacity: 0 });

          // Beat 1: plan present from t0 (so the loop seam matches); planned slot pulses
          tl.fromTo("#b1 .cell.plan", { boxShadow: "0 0 0 rgba(142,45,226,0)" }, { boxShadow: "0 0 32px -6px rgba(142,45,226,.5)", duration: 0.5, yoyo: true, repeat: 1 }, 0.9);

          // → write
          tl.to("#st-plan", { opacity: 0, duration: 0.3 }, 2.0);
          tl.to("#st-write", { opacity: 1, duration: 0.3 }, 2.1);
          tl.to("#b1", { opacity: 0, y: -20, duration: 0.4, ease: "power2.in" }, 1.9);
          tl.fromTo("#b2", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 2.25);
          // lines "type" in, with a blinking cursor
          tl.fromTo("#b2 .ln", { scaleX: 0 }, { scaleX: 1, duration: 0.6, stagger: 0.28, ease: "power2.out", immediateRender: false }, 2.5);
          tl.to("#caret", { opacity: 1, duration: 0.45, repeat: 3, yoyo: true, ease: "steps(1)", immediateRender: false }, 2.6);

          // → publish
          tl.to("#st-write", { opacity: 0, duration: 0.3 }, 4.2);
          tl.to("#st-pub", { opacity: 1, duration: 0.3 }, 4.3);
          tl.to("#b2", { opacity: 0, y: -20, duration: 0.4, ease: "power2.in" }, 4.1);
          tl.fromTo("#b3", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 4.45);
          ["#c1", "#c2", "#c3"].forEach((c, i) => {
            const t = 4.8 + i * 0.4;
            tl.to(c + " .cdone", { opacity: 1, duration: 0.35, ease: "power2.out" }, t);
            tl.to(c + " .ci", { color: "#009b74", duration: 0.35 }, t);
            tl.to(c + " .tk", { color: "#009b74", duration: 0.35 }, t);
            tl.fromTo(c, { scale: 0.97 }, { scale: 1, duration: 0.4, ease: "back.out(2)", immediateRender: false }, t);
          });

          // → loop back to plan
          tl.to(["#b3", "#st-pub"], { opacity: 0, duration: 0.4, ease: "power2.in" }, 6.3);
          tl.to(".chan .cdone", { opacity: 0, duration: 0.3 }, 6.5);
          tl.to([".chan .ci", ".chan .tk"], { color: "#8a8190", duration: 0.3 }, 6.5);
          tl.to("#st-plan", { opacity: 1, duration: 0.4 }, 6.5);
          tl.fromTo("#b1", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out", immediateRender: false }, 6.5);

          window.__timelines = window.__timelines || {};
          window.__timelines["content-marketing"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
